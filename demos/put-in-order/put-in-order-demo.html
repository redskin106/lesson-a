<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Put in Order — Live Asset Test</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #0a0a12;
    display: grid;
    place-items: center;
    min-height: 100vh;
  }
  .frame-wrap {
    width: min(400px, 100vw);
    max-height: 94vh;
    position: relative;
    container-type: inline-size;
  }
  .frame-wrap::before { content: ''; display: block; padding-top: 215%; }
  .app-frame {
    position: absolute; inset: 0;
    overflow: hidden;
  }
  .layer-bg {
    position: absolute; inset: 0;
    background-image: url('assets/bg_and_border.png');
    background-size: 100% 100%;
    z-index: 0;
  }
  .layer-scene {
    position: absolute;
    left: 2.58%; top: 51.47%; width: 94.83%; height: 42.98%;
    background-image: url('assets/school_scene.png');
    background-size: 100% 100%;
    z-index: 1;
  }
  .pos { position: absolute; z-index: 2; }
  .block-header   { left: 12.92%; top: 8.06%;  width: 75%;    height: 3.5%; }
  .block-qlabel   { left: 13.08%; top: 15.85%; width: 75%;    height: 1.28%; }
  .block-progress { left: 13.08%; top: 19.69%; width: 75.17%; height: 1.01%; }
  .block-flowzone { left: 13.00%; top: 25.89%; width: 75.08%; }

  .badge {
    width: 9cqw; aspect-ratio: 1/1; border-radius: 50%;
    background: linear-gradient(90deg,#753A70,#A54D75);
    display: flex; align-items: center; justify-content: center;
    color: #fff; font-weight: 500; font-size: 3.6cqw; flex-shrink: 0;
  }
  .header-inner { display: flex; align-items: center; justify-content: space-between; height: 100%; }
  .header-left { display: flex; align-items: center; gap: 5%; min-width: 0; }
  .module-title { color: #fff; font-weight: 500; font-size: 3.9cqw; white-space: nowrap; }
  .medal-icon { flex-shrink: 0; }
  .medal-icon img { width: 6.5cqw; height: 6.5cqw; display: block; }

  .q-label { color: rgba(255,255,255,0.4); font-size: 3cqw; }
  .prog-track { width: 100%; height: 100%; background: #202336; border-radius: 99px; overflow: hidden; }
  .prog-fill { width: 0%; height: 100%; background: linear-gradient(90deg,#705697,#9D6089); border-radius: 99px; transition: width .4s; }

  .seq-prompt { color: #fff; font-size: 4cqw; text-align: center; margin-bottom: 5%; line-height: 1.4; }

  .seq-slots { display: flex; flex-direction: column; gap: 2%; margin-bottom: 5%; }
  .seq-slot {
    display: flex; align-items: center; gap: 3%;
    background: rgba(255,255,255,0.05); border: 1.5px solid rgba(255,255,255,0.08);
    border-radius: 12px; padding: 3% 4%; min-height: 8cqw;
    font-size: 3.4cqw; color: rgba(255,255,255,0.4);
    transition: border-color .2s, background .2s;
  }
  .slot-num { font-weight: 700; font-size: 3.8cqw; flex-shrink: 0; width: 6%; }
  .slot-text { color: rgba(255,255,255,0.85); line-height: 1.3; }

  .seq-pool-label { color: rgba(255,255,255,0.4); font-size: 3cqw; text-align: center; margin-bottom: 3%; }
  .seq-pool { display: flex; flex-wrap: wrap; gap: 2.5%; justify-content: center; margin-bottom: 5%; }
  .seq-item {
    background: rgba(255,255,255,0.05); border: 1.5px solid rgba(255,255,255,0.08);
    border-radius: 12px; padding: 2.5% 4%;
    color: rgba(255,255,255,0.85); font-size: 3.4cqw; font-family: inherit;
    cursor: pointer; transition: opacity .25s, transform .12s;
  }
  .seq-item.used { opacity: 0.25; pointer-events: none; }

  .action-btn {
    display: none; margin: 0 auto;
    padding: 3% 12%; border-radius: 999px;
    background: rgba(112,82,180,0.16); border: 1.5px solid rgba(112,82,180,0.5);
    color: #C9B8EA; font-size: 4.4cqw; font-weight: 500; cursor: pointer; font-family: inherit;
  }
  .proceed-btn {
    display: none; margin: 0 auto;
    padding: 3% 12%; border-radius: 999px; border: none;
    background: linear-gradient(180deg,#3D30B7 0%,#7052B4 45%,#A45B8B 100%);
    color: #fff; font-size: 4.4cqw; font-weight: 500; cursor: pointer; font-family: inherit;
  }

  .overlay {
    display: none; position: absolute; inset: 0; z-index: 3;
    background: rgba(10,8,20,0.9);
    text-align: center; align-items: center; justify-content: center;
    flex-direction: column; padding: 5%;
  }
  .next-module-btn {
    padding: 3% 12%; border-radius: 999px; border: none;
    background: linear-gradient(180deg,#3D30B7 0%,#7052B4 45%,#A45B8B 100%);
    color: #fff; font-size: 4cqw; font-weight: 500; cursor: pointer; font-family: inherit;
  }
  .stars-row { font-size: 10cqw; margin-bottom: 4%; letter-spacing: 6px; min-height: 12cqw; }
</style>
</head>
<body>
<div class="frame-wrap">
<div class="app-frame">
  <div class="layer-bg"></div>
  <div class="layer-scene"></div>

  <div class="pos block-header">
    <div class="header-inner">
      <div class="header-left">
        <div class="badge">7</div>
        <span class="module-title">Put in Order</span>
      </div>
      <div class="medal-icon"><img src="assets/silver.png?v=2" alt="Silver tier"></div>
    </div>
  </div>

  <div class="pos block-qlabel q-label" id="qLabel">Question 1 of 3</div>

  <div class="pos block-progress">
    <div class="prog-track"><div class="prog-fill" id="progFill"></div></div>
  </div>

  <div class="pos block-flowzone">
    <p class="seq-prompt" id="seqPrompt"></p>
    <div class="seq-slots" id="seqSlots"></div>
    <p class="seq-pool-label">Tap to place ↓</p>
    <div class="seq-pool" id="seqPool"></div>
    <button id="checkBtn" class="action-btn">Check ✓</button>
    <button id="nextBtn" class="proceed-btn">Next →</button>
  </div>

  <div id="overlay" class="overlay">
    <div class="stars-row" id="starsRow"></div>
    <div style="font-size:5cqw;color:#fff;font-weight:500;margin-bottom:2%;">Module complete</div>
    <div style="font-size:3.3cqw;color:rgba(255,255,255,0.5);margin-bottom:7%;" id="scoreLabel"></div>
    <button id="nextModuleBtn" class="next-module-btn">Next module</button>
  </div>
</div>
</div>
<script>
(function(){
  // Real 5-color palette, copied verbatim from the sequencing renderer
  var SEQ_PALETTE = [
    { border:'#00BCD4', bg:'rgba(0,188,212,0.15)',  text:'#00BCD4' },
    { border:'#AB47BC', bg:'rgba(171,71,188,0.15)', text:'#CE93D8' },
    { border:'#FF9800', bg:'rgba(255,152,0,0.15)',  text:'#FFB74D' },
    { border:'#E91E63', bg:'rgba(233,30,99,0.15)',  text:'#F48FB1' },
    { border:'#8BC34A', bg:'rgba(139,195,74,0.15)', text:'#AED581' }
  ];

  // Real data, copied verbatim from LESSON['mod-7'] in index.html
  var tiers = [
    { prompt:'Put these in order — morning first.',
      items:['eat lunch','wake up','eat breakfast'],
      correct:['wake up','eat breakfast','eat lunch'] },
    { prompt:'Put these in the right order.',
      items:['go to school','wake up','eat dinner','eat breakfast'],
      correct:['wake up','eat breakfast','go to school','eat dinner'] },
    { prompt:'Put these in the right order.',
      items:['go home','wake up','eat dinner','eat breakfast','go to school'],
      correct:['wake up','eat breakfast','go to school','go home','eat dinner'] }
  ];
  var ti = 0, totalScore = 0;

  var ctx = null;
  function unlock(){ if(!ctx){ ctx = new (window.AudioContext||window.webkitAudioContext)(); } }
  function tone(freq, dur){
    unlock();
    var o = ctx.createOscillator(), g = ctx.createGain();
    o.frequency.value = freq; g.gain.setValueAtTime(0.15, ctx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime+dur);
    o.connect(g); g.connect(ctx.destination); o.start(); o.stop(ctx.currentTime+dur);
  }
  function sfx(name){
    if(name==='tap') tone(600,0.06);
    if(name==='correct'){ tone(880,0.12); setTimeout(function(){tone(1180,0.14);},90); }
    if(name==='wrong') tone(350,0.22);
    if(name==='star') tone(1000,0.1);
    if(name==='complete'){ tone(700,0.1); setTimeout(function(){tone(1050,0.16);},110); }
  }

  var seqPrompt = document.getElementById('seqPrompt');
  var slotsEl = document.getElementById('seqSlots');
  var poolEl = document.getElementById('seqPool');
  var checkBtn = document.getElementById('checkBtn');
  var nextBtn = document.getElementById('nextBtn');
  var overlay = document.getElementById('overlay');

  var slots, checked;

  function renderSlots(){
    slotsEl.innerHTML = '';
    slots.forEach(function(val, i){
      var c = SEQ_PALETTE[i % SEQ_PALETTE.length];
      var slot = document.createElement('div');
      slot.className = 'seq-slot';
      slot.innerHTML = '<div class="slot-num" style="color:'+c.border+';">'+(i+1)+'</div><div class="slot-text">'+(val || '')+'</div>';

      if(val && !checked){
        slot.style.borderColor = c.border;
        slot.style.background = c.bg;
        slot.querySelector('.slot-text').style.color = c.text;
        slot.style.cursor = 'pointer';
        slot.addEventListener('click', function(){
          var word = slots[i];
          slots[i] = null;
          poolEl.querySelectorAll('.seq-item').forEach(function(b){
            if(b.dataset.word === word) b.classList.remove('used');
          });
          sfx('tap');
          renderSlots();
          updateCheck();
        });
      }
      slotsEl.appendChild(slot);
    });
  }

  function updateCheck(){
    checkBtn.style.display = slots.every(function(s){ return s !== null; }) ? 'block' : 'none';
  }

  function renderTier(){
    var t = tiers[ti];
    slots = new Array(t.correct.length).fill(null);
    checked = false;

    document.getElementById('progFill').style.width = Math.round((ti/tiers.length)*100)+'%';
    document.getElementById('qLabel').textContent = 'Question '+(ti+1)+' of '+tiers.length;
    seqPrompt.textContent = t.prompt;
    checkBtn.style.display = 'none';
    nextBtn.style.display = 'none';

    var shuffled = t.items.slice().sort(function(){ return Math.random() - 0.5; });
    poolEl.innerHTML = '';
    shuffled.forEach(function(word){
      var btn = document.createElement('button');
      btn.className = 'seq-item';
      btn.textContent = word;
      btn.dataset.word = word;
      btn.addEventListener('click', function(){
        if(btn.classList.contains('used') || checked) return;
        var emptyIdx = slots.indexOf(null);
        if(emptyIdx === -1) return;
        unlock();
        slots[emptyIdx] = word;
        btn.classList.add('used');
        sfx('tap');
        renderSlots();
        updateCheck();
      });
      poolEl.appendChild(btn);
    });

    renderSlots();
  }

  checkBtn.addEventListener('click', function(){
    if(checked) return;
    checked = true;
    checkBtn.style.display = 'none';
    poolEl.querySelectorAll('.seq-item').forEach(function(b){ b.style.pointerEvents = 'none'; });

    var t = tiers[ti];
    var correctCount = 0;
    slotsEl.querySelectorAll('.seq-slot').forEach(function(slot, i){
      var isCorrect = (slots[i] === t.correct[i]);
      if(isCorrect){
        slot.style.borderColor = '#8BC34A';
        slot.style.background = 'rgba(139,195,74,0.15)';
      } else {
        slot.style.borderColor = '#E91E63';
        slot.style.background = 'rgba(233,30,99,0.12)';
        slot.querySelector('.slot-text').innerHTML =
          '<span style="text-decoration:line-through;opacity:0.5;">'+slots[i]+'</span> ' +
          '<span style="color:#AED581;margin-left:4px;">→ '+t.correct[i]+'</span>';
      }
      if(isCorrect) correctCount++;
    });

    var score = correctCount / t.correct.length;
    totalScore += score;
    sfx(score === 1 ? 'correct' : 'wrong');
    nextBtn.style.display = 'block';
  });

  nextBtn.addEventListener('click', function(){
    ti++;
    if(ti < tiers.length){
      renderTier();
    } else {
      document.getElementById('progFill').style.width = '100%';
      var avgScore = totalScore / tiers.length;
      var starCount = avgScore === 1 ? 3 : avgScore >= 0.6 ? 2 : 1;
      document.getElementById('scoreLabel').textContent = Math.round(avgScore*100)+'% correct';
      var starsEl = document.getElementById('starsRow');
      starsEl.innerHTML = '';
      overlay.style.display = 'flex';
      var i = 0;
      function dropStar(){
        if(i >= starCount){ sfx('complete'); return; }
        var span = document.createElement('span');
        span.textContent = '\u2605';
        span.style.color = '#F0AE63';
        span.style.display = 'inline-block';
        starsEl.appendChild(span);
        span.animate([{transform:'translateY(-20px) scale(0.5)',opacity:0},{transform:'translateY(0) scale(1)',opacity:1}],{duration:320,easing:'ease-out'});
        sfx('star');
        i++;
        setTimeout(dropStar, 220);
      }
      dropStar();
    }
  });
  document.getElementById('nextModuleBtn').addEventListener('click', function(){
    overlay.style.display = 'none';
    ti = 0; totalScore = 0;
    renderTier();
  });

  renderTier();
})();
</script>
</body>
</html>
