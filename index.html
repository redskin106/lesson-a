<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>EFL Lesson</title>
<style>

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:         #0D1B2A;
  --surface:    #162436;
  --surface2:   #1E3248;
  --text:       #EEF2F7;
  --text-dim:   #7A9BBF;
  --accent:     #4FC3F7;
  --bronze:     #CD7F32;
  --bronze-bg:  rgba(205,127,50,0.15);
  --silver:     #A0AEC0;
  --silver-bg:  rgba(160,174,192,0.15);
  --gold:       #FFD700;
  --gold-bg:    rgba(255,215,0,0.12);
  --pass:       #4CAF50;
  --fail:       #EF5350;
  --radius:     12px;
  --radius-sm:  8px;
}

html, body {
  height: 100%;
  background: var(--bg);
  color: var(--text);
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  font-size: 16px;
  line-height: 1.5;
  overflow: hidden;
}

.screen {
  display: none;
  flex-direction: column;
  height: 100dvh;
  overflow-y: auto;
  padding: 28px 20px 32px;
}
.screen.active { display: flex; }

/* ─── NAME PICKER ─────────────────────────── */

.welcome-label {
  font-size: 12px;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--text-dim);
  margin-bottom: 6px;
}
.welcome-title {
  font-size: 30px;
  font-weight: 700;
  margin-bottom: 4px;
}
.welcome-sub {
  color: var(--text-dim);
  font-size: 15px;
  margin-bottom: 28px;
}
.name-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
  margin-bottom: 20px;
}
.name-btn {
  background: var(--surface2);
  border: 2px solid transparent;
  border-radius: var(--radius);
  color: var(--text);
  font-size: 17px;
  font-weight: 600;
  padding: 18px 12px;
  min-height: 60px;
  cursor: pointer;
  text-align: center;
  transition: border-color 0.15s, background 0.15s;
}
.name-btn.selected {
  border-color: var(--accent);
  background: rgba(79,195,247,0.1);
  color: var(--accent);
}
.start-btn {
  background: var(--accent);
  color: #0D1B2A;
  border: none;
  border-radius: var(--radius);
  font-size: 18px;
  font-weight: 700;
  padding: 18px;
  width: 100%;
  cursor: pointer;
  opacity: 0.25;
  pointer-events: none;
  transition: opacity 0.2s;
  margin-top: auto;
}
.start-btn.ready { opacity: 1; pointer-events: auto; }

/* ─── MODULE SCREEN ──────────────────────── */

.module-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 14px;
}
.student-name {
  font-size: 14px;
  color: var(--text-dim);
  font-weight: 600;
}
.tier-badge {
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  padding: 4px 12px;
  border-radius: 20px;
}
.tier-badge.bronze { background: var(--bronze-bg); color: var(--bronze); }
.tier-badge.silver { background: var(--silver-bg); color: var(--silver); }
.tier-badge.gold   { background: var(--gold-bg);   color: var(--gold);   }

.progress-row {
  display: flex;
  gap: 6px;
  margin-bottom: 14px;
}
.pip {
  flex: 1;
  height: 4px;
  border-radius: 2px;
  background: var(--surface2);
  transition: background 0.3s;
}
.pip.done    { background: var(--pass); }
.pip.current { background: var(--accent); }

.tier-track {
  display: flex;
  gap: 8px;
  margin-bottom: 22px;
}
.tier-seg {
  flex: 1;
  padding: 9px 6px;
  border-radius: var(--radius-sm);
  text-align: center;
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  opacity: 0.25;
  transition: opacity 0.3s;
}
.tier-seg.bronze { background: var(--bronze-bg); color: var(--bronze); }
.tier-seg.silver { background: var(--silver-bg); color: var(--silver); }
.tier-seg.gold   { background: var(--gold-bg);   color: var(--gold);   }
.tier-seg.active { opacity: 1; }
.tier-seg.passed { opacity: 0.65; }
.tier-seg.passed::after { content: ' ✓'; }

#module-container { flex: 1; }

/* ─── TIER RESULT SCREEN ─────────────────── */

.result-icon  { font-size: 64px; text-align: center; margin: 28px 0 14px; }
.result-title { font-size: 26px; font-weight: 700; text-align: center; margin-bottom: 6px; }
.result-score { font-size: 17px; color: var(--text-dim); text-align: center; margin-bottom: 28px; }
.result-score span { color: var(--text); font-weight: 700; }
.result-msg {
  background: var(--surface2);
  border-radius: var(--radius);
  padding: 16px 20px;
  font-size: 15px;
  color: var(--text-dim);
  text-align: center;
  margin-bottom: 28px;
  line-height: 1.6;
}
.result-msg strong { color: var(--text); }

.cta-btn {
  display: block; width: 100%;
  background: var(--accent); color: #0D1B2A;
  border: none; border-radius: var(--radius);
  font-size: 18px; font-weight: 700;
  padding: 18px; cursor: pointer;
  text-align: center; margin-bottom: 12px;
}
.secondary-btn {
  display: block; width: 100%;
  background: var(--surface2); color: var(--text);
  border: none; border-radius: var(--radius);
  font-size: 16px; font-weight: 600;
  padding: 16px; cursor: pointer; text-align: center;
}

/* ─── END SCREEN ─────────────────────────── */

.end-header { text-align: center; padding: 16px 0 20px; }
.end-trophy  { font-size: 56px; margin-bottom: 10px; }
.end-name    { font-size: 24px; font-weight: 700; margin-bottom: 4px; }
.end-total   { font-size: 15px; color: var(--text-dim); }
.end-total span { color: var(--accent); font-weight: 700; }

.summary-list { display: flex; flex-direction: column; gap: 10px; margin: 20px 0; }

.summary-item {
  background: var(--surface2);
  border-radius: var(--radius);
  padding: 14px 16px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
}
.summary-item-label  { font-size: 15px; font-weight: 600; }
.summary-item-detail { font-size: 13px; color: var(--text-dim); margin-top: 2px; }
.summary-status {
  font-size: 12px; font-weight: 700;
  padding: 4px 10px; border-radius: 20px; white-space: nowrap;
}
.summary-status.complete   { background: rgba(76,175,80,0.15);  color: var(--pass); }
.summary-status.incomplete { background: rgba(239,83,80,0.15);  color: var(--fail); }

.retry-btn {
  display: block; width: 100%;
  background: transparent; color: var(--text);
  border: 2px solid var(--fail); border-radius: var(--radius);
  font-size: 16px; font-weight: 600;
  padding: 16px; cursor: pointer; text-align: center; margin-bottom: 12px;
}
.done-btn {
  display: block; width: 100%;
  background: var(--pass); color: #fff;
  border: none; border-radius: var(--radius);
  font-size: 18px; font-weight: 700;
  padding: 18px; cursor: pointer; text-align: center;
}

/* ─── MODULE: AUDIO UNDERSTANDING ──────────── */

.module-title    { font-size: 17px; font-weight: 700; margin-bottom: 6px; }
.module-question { font-size: 15px; color: var(--text-dim); margin-bottom: 20px; }

.listen-btn {
  display: flex; align-items: center; justify-content: center; gap: 10px;
  width: 100%;
  background: var(--surface2);
  border: 2px solid var(--accent);
  border-radius: var(--radius);
  color: var(--accent);
  font-size: 16px; font-weight: 700;
  padding: 16px; cursor: pointer; margin-bottom: 20px;
  transition: background 0.15s;
}
.listen-btn.playing { background: rgba(79,195,247,0.1); }

.options-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
}
.option-btn {
  background: var(--surface2);
  border: 2px solid transparent;
  border-radius: var(--radius);
  color: var(--text);
  font-size: 15px; font-weight: 500;
  padding: 16px 12px; min-height: 64px;
  cursor: pointer; text-align: center;
  transition: border-color 0.15s, background 0.15s, opacity 0.25s;
}
.option-btn.correct { border-color: var(--pass); background: rgba(76,175,80,0.12); color: var(--pass); }
.option-btn.wrong   { border-color: var(--fail); background: rgba(239,83,80,0.1);  color: var(--fail); }
.option-btn:disabled { cursor: default; }
.option-btn.locked  { opacity: 0; pointer-events: none; }

.next-ex-btn {
  display: block; width: 100%;
  background: var(--accent); color: #0D1B2A;
  border: none; border-radius: var(--radius);
  font-size: 18px; font-weight: 700;
  padding: 18px; cursor: pointer; margin-top: 20px;
}

/* ─── MODULE: GAP FILL ──────────────────────── */

.sentence-display {
  background: var(--surface2);
  border-radius: var(--radius);
  padding: 20px 18px;
  font-size: 18px;
  line-height: 2;
  margin-bottom: 20px;
}
.blank-slot {
  display: inline-block;
  min-width: 80px;
  border-bottom: 2px solid var(--accent);
  color: var(--accent);
  font-weight: 700;
  text-align: center;
  padding: 0 6px;
  transition: color 0.2s, border-color 0.2s;
}
.word-bank {
  display: flex;
  flex-wrap: wrap;
  gap: 10px;
  margin-bottom: 4px;
}
.word-btn {
  background: var(--surface2);
  border: 2px solid transparent;
  border-radius: var(--radius-sm);
  color: var(--text);
  font-size: 15px; font-weight: 600;
  padding: 12px 16px;
  cursor: pointer;
  transition: border-color 0.15s, background 0.15s, color 0.15s;
}
.word-btn.selected { border-color: var(--accent); background: rgba(79,195,247,0.1); color: var(--accent); }
.word-btn.correct  { border-color: var(--pass);   color: var(--pass); }
.word-btn.wrong    { border-color: var(--fail);   color: var(--fail); }
.word-btn:disabled { cursor: default; }

/* ─── MODULE: TRUE / FALSE ──────────────────── */

.tf-statement {
  background: var(--surface2);
  border-radius: var(--radius);
  padding: 24px 20px;
  font-size: 18px;
  line-height: 1.6;
  margin-bottom: 28px;
  text-align: center;
}
.tf-buttons {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
}
.tf-btn {
  border: 2px solid transparent;
  border-radius: var(--radius);
  font-size: 19px; font-weight: 700;
  padding: 24px 12px;
  cursor: pointer;
  transition: all 0.15s;
}
.tf-btn.true-btn  { background: rgba(76,175,80,0.1);  color: var(--pass); border-color: var(--pass); }
.tf-btn.false-btn { background: rgba(239,83,80,0.1);  color: var(--fail); border-color: var(--fail); }
.tf-btn.highlight-correct { background: var(--pass);  color: #fff; border-color: var(--pass); }
.tf-btn.highlight-wrong   { background: var(--fail);  color: #fff; border-color: var(--fail); }
.tf-btn:disabled { cursor: default; opacity: 0.7; }

/* ─── MODULE: WORD MATCH ────────────────────── */

.match-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
  margin-bottom: 20px;
}
.match-col { display: flex; flex-direction: column; gap: 8px; }
.match-btn {
  background: var(--surface2);
  border: 2px solid transparent;
  border-radius: var(--radius-sm);
  color: var(--text);
  font-size: 14px; font-weight: 600;
  padding: 12px 10px;
  min-height: 54px;
  cursor: pointer; text-align: center;
  line-height: 1.3;
  transition: all 0.15s;
}
.match-btn.selected   { border-color: var(--accent); background: rgba(79,195,247,0.1); color: var(--accent); }
.match-btn.matched    { border-color: var(--pass);   background: rgba(76,175,80,0.12); color: var(--pass); pointer-events: none; }
.match-btn.wrong-flash { border-color: var(--fail);  background: rgba(239,83,80,0.1); }
.match-score {
  font-size: 14px; color: var(--text-dim);
  text-align: center; margin-bottom: 12px;
}

/* ─── MODULE: SEQUENCING ────────────────────── */

.seq-prompt { font-size: 15px; color: var(--text-dim); margin-bottom: 14px; }
.seq-slots  { display: flex; flex-direction: column; gap: 8px; margin-bottom: 16px; }
.seq-slot {
  display: flex; align-items: center; gap: 12px;
  background: var(--surface2);
  border: 2px dashed rgba(255,255,255,0.1);
  border-radius: var(--radius-sm);
  padding: 12px 14px; min-height: 50px;
  transition: border-color 0.2s, background 0.2s;
}
.seq-slot.filled  { border-style: solid; border-color: var(--accent); cursor: pointer; }
.seq-slot.correct { border-color: var(--pass); background: rgba(76,175,80,0.1); }
.seq-slot.wrong   { border-color: var(--fail); background: rgba(239,83,80,0.08); }
.slot-num {
  width: 24px; height: 24px; flex-shrink: 0;
  background: var(--surface); border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 11px; font-weight: 700; color: var(--text-dim);
  transition: background 0.2s, color 0.2s;
}
.seq-slot.filled .slot-num { background: var(--accent); color: #0D1B2A; }
.slot-text { font-size: 15px; font-weight: 600; }
.seq-pool-label { font-size: 12px; color: var(--text-dim); letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 10px; }
.seq-pool  { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 4px; }
.seq-item {
  background: var(--surface2);
  border: 2px solid transparent;
  border-radius: var(--radius-sm);
  color: var(--text);
  font-size: 14px; font-weight: 600;
  padding: 11px 14px;
  cursor: pointer;
  transition: all 0.15s;
}
.seq-item:active { background: var(--surface); }
.seq-item.used   { opacity: 0.2; pointer-events: none; }

/* ─── MODULE: AUDIO SPEAKING ────────────────── */

.speak-target {
  background: var(--surface2);
  border-radius: var(--radius);
  padding: 22px 20px;
  font-size: 20px; font-weight: 700;
  text-align: center; line-height: 1.5;
  margin-bottom: 20px;
}

/* Three-button comparison row */
.speak-trio {
  display: grid;
  grid-template-columns: 1fr 1fr 1fr;
  gap: 10px;
  margin-bottom: 20px;
}
.trio-btn {
  display: flex; flex-direction: column;
  align-items: center; justify-content: center; gap: 6px;
  background: var(--surface2);
  border: 2px solid transparent;
  border-radius: var(--radius);
  padding: 16px 8px;
  cursor: pointer;
  transition: all 0.2s;
  min-height: 80px;
}
.trio-btn .trio-icon  { font-size: 24px; line-height: 1; }
.trio-btn .trio-label { font-size: 11px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; color: var(--text-dim); }

/* Model button — accent blue */
.trio-btn.model { border-color: var(--accent); color: var(--accent); }
.trio-btn.model .trio-label { color: var(--accent); }
.trio-btn.model.playing { background: rgba(79,195,247,0.1); }

/* Playback button — purple, disabled until recorded */
.trio-btn.playback { border-color: #AB47BC; color: #CE93D8; opacity: 0.3; pointer-events: none; }
.trio-btn.playback .trio-label { color: #AB47BC; }
.trio-btn.playback.ready { opacity: 1; pointer-events: auto; }
.trio-btn.playback.playing { background: rgba(171,71,188,0.1); }

/* Record button — red */
.trio-btn.record { border-color: var(--fail); color: var(--fail); }
.trio-btn.record .trio-label { color: var(--fail); }
.trio-btn.record.recording {
  background: rgba(239,83,80,0.1);
  animation: pulse-record 1s ease-in-out infinite;
}
@keyframes pulse-record {
  0%, 100% { box-shadow: 0 0 0 0   rgba(239,83,80,0.4); }
  50%       { box-shadow: 0 0 0 8px rgba(239,83,80,0);   }
}

.speak-hint {
  font-size: 13px; color: var(--text-dim);
  text-align: center; margin-bottom: 20px;
}

/* Self-assess — appears after first recording */
.assess-btns { display: flex; flex-direction: column; gap: 10px; margin-bottom: 4px; }
.assess-btn {
  border: 2px solid transparent; border-radius: var(--radius);
  font-size: 16px; font-weight: 700; padding: 18px; cursor: pointer;
  transition: all 0.15s;
}
.assess-yes { background: rgba(76,175,80,0.1); color: var(--pass); border-color: var(--pass); }
.assess-no  { background: rgba(239,83,80,0.1); color: var(--fail); border-color: var(--fail); }
.assess-btn.selected.assess-yes { background: var(--pass); color: #fff; }
.assess-btn.selected.assess-no  { background: var(--fail); color: #fff; }
.assess-btn:disabled { cursor: default; opacity: 0.5; }
.no-mic-msg {
  background: var(--surface2); border-radius: var(--radius-sm);
  padding: 14px 16px; font-size: 14px; color: var(--text-dim);
  text-align: center; margin-bottom: 14px; line-height: 1.6;
}


/* ─── NEW MODULE STYLES ──────────────────────── */
.option-btn.selected {
  border-color: var(--accent);
  background: rgba(79,195,247,0.08);
  color: var(--accent);
}
.module-game-label {
  font-size: 11px;
  letter-spacing: .1em;
  text-transform: uppercase;
  color: var(--gold);
  text-align: center;
  margin-bottom: 8px;
}
</style>
</head>
<body>

<!-- ═══════════════════════════════════
     SCREEN 1 — NAME PICKER
════════════════════════════════════ -->
<div id="screen-name" class="screen active">
  <p class="welcome-label">EFL Lesson</p>
  <h1 class="welcome-title">Hello! 👋</h1>
  <p class="welcome-sub">Tap your name to begin.</p>
  <div class="name-grid" id="name-grid"></div>
  <button class="start-btn" id="start-btn">Start →</button>
</div>

<!-- ═══════════════════════════════════
     SCREEN 2 — MODULE
════════════════════════════════════ -->
<div id="screen-module" class="screen">
  <div class="module-header">
    <span class="student-name" id="header-name"></span>
    <span class="tier-badge bronze" id="tier-badge">Bronze</span>
  </div>
  <div class="progress-row" id="progress-pips"></div>
  <div class="tier-track">
    <div class="tier-seg bronze" id="seg-bronze">Bronze</div>
    <div class="tier-seg silver" id="seg-silver">Silver</div>
    <div class="tier-seg gold"   id="seg-gold">Gold</div>
  </div>
  <div id="module-container"></div>
</div>

<!-- ═══════════════════════════════════
     SCREEN 3 — TIER RESULT
════════════════════════════════════ -->
<div id="screen-tier-result" class="screen">
  <div class="result-icon"  id="result-icon"></div>
  <h2 class="result-title"  id="result-title"></h2>
  <p  class="result-score"  id="result-score"></p>
  <p  class="result-msg"    id="result-msg"></p>
  <button class="cta-btn"       id="result-cta"></button>
  <button class="secondary-btn" id="result-secondary" style="display:none"></button>
</div>

<!-- ═══════════════════════════════════
     REINFORCEMENT PANEL
     Shared by image-vocab, memory-pairs,
     word-scramble, spelling modules
════════════════════════════════════ -->
<div id="reinforce-panel" style="
  position:fixed;bottom:0;left:0;right:0;
  background:#0D1B2A;
  border-top:1px solid #1E3248;
  border-radius:20px 20px 0 0;
  padding:1.5rem 1.5rem 2.25rem;
  display:flex;flex-direction:column;align-items:center;gap:.75rem;
  transform:translateY(100%);
  transition:transform .35s cubic-bezier(.4,0,.2,1);
  z-index:200;
">
  <div id="rp-em"   style="font-size:64px;line-height:1;"></div>
  <div id="rp-word" style="font-size:28px;font-weight:600;color:#FFD700;letter-spacing:.03em;"></div>
  <div id="rp-sent" style="font-size:15px;color:#7A9BBF;text-align:center;line-height:1.7;"></div>
  <div style="width:100%;height:3px;background:#1E3248;border-radius:99px;overflow:hidden;margin-top:.25rem;">
    <div id="rp-bar" style="height:100%;background:#FFD700;width:0%;border-radius:99px;transition:width linear;"></div>
  </div>
</div>

<!-- ═══════════════════════════════════
     SCREEN 4 — END SCREEN
════════════════════════════════════ -->
<div id="screen-end" class="screen">
  <div class="end-header">
    <div class="end-trophy">🏆</div>
    <div class="end-name"  id="end-name"></div>
    <div class="end-total" id="end-total"></div>
  </div>
  <div class="summary-list" id="summary-list"></div>
  <button class="retry-btn" id="retry-btn" style="display:none">↩ Retry incomplete modules</button>
  <button class="done-btn"  id="done-btn">✓ Done</button>
</div>

<script>
// ══════════════════════════════════════════════════
//  CONFIG
// ══════════════════════════════════════════════════

const STUDENTS       = ['Sophy','Davit','Sam','Nu','Tue','Yee','Lee Ga','Felix','Tin','Ken','Thai'];
const PASS_THRESHOLD = 0.6; // 60% to pass a tier

// ══════════════════════════════════════════════════
//  LESSON DATA
//  Each module: { id, type, label, data: { bronze, silver, gold } }
//  Add / replace entries here to build the full lesson.
// ══════════════════════════════════════════════════

const LESSON = [
  {
    id: 'mod-1',
    type: 'audio-understanding',
    label: 'Listen & Choose 1',
    data: {
      bronze: {
        audio: 'dog',
        question: 'What word did you hear?',
        options: ['dog','cat','bus','book'],
