<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gap Fill — Live Asset Test</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #0a0a12;
    display: grid;
    place-items: center;
    min-height: 100vh;
  }
  .frame-wrap {
    width: min(400px, 100vw);
    max-height: 94vh;
    position: relative;
    container-type: inline-size;
  }
  .frame-wrap::before { content: ''; display: block; padding-top: 215%; }
  .app-frame {
    position: absolute; inset: 0;
    overflow: hidden;
    border-radius: 12.7cqw;
  }
  .layer-bg {
    position: absolute; inset: 0;
    background-image: url('assets/bg_and_border.png');
    background-size: 100% 100%;
    z-index: 0;
  }
  .layer-scene {
    position: absolute;
    left: 2.58%; top: 51.47%; width: 94.83%; height: 42.98%;
    background-image: url('assets/school_scene.png');
    background-size: 100% 100%;
    z-index: 1;
  }
  /* Every block below is positioned at the EXACT percentage of the
     original PSD layer bounding box (canvas 1200x2580). Do not
     convert these to flexbox/margins — they must stay in sync with
     the source file's own coordinates. */
  .pos { position: absolute; z-index: 2; }
  .block-header   { left: 12.92%; top: 8.06%;  width: 75%;    height: 3.5%; }
  .block-qlabel   { left: 13.08%; top: 15.85%; width: 40%;    height: 1.28%; }
  .block-progress { left: 13.08%; top: 19.69%; width: 75.17%; height: 1.01%; }
  .block-flowzone { left: 13.00%; top: 24.99%; width: 75.08%; }
  .block-legend   { left: 16.33%; top: 52.67%; width: 65.00%; height: 1.28%; }

  .badge {
    width: 9cqw; aspect-ratio: 1/1; border-radius: 50%;
    background: linear-gradient(90deg,#753A70,#A54D75);
    display: flex; align-items: center; justify-content: center;
    color: #fff; font-weight: 500;
    font-size: 3.6cqw;
    flex-shrink: 0;
  }
  .header-inner { display: flex; align-items: center; justify-content: space-between; height: 100%; }
  .header-left { display: flex; align-items: center; gap: 2.5cqw; min-width: 0; }
  .module-title { color: #fff; font-weight: 500; font-size: 3.9cqw; white-space: nowrap; }
  .medal-icon { flex-shrink: 0; }
  .medal-icon img { width: 6.5cqw; height: 6.5cqw; display: block; }

  .q-label { color: rgba(255,255,255,0.4); font-size: 3cqw; }
  .prog-track { width: 100%; height: 100%; background: #202336; border-radius: 99px; overflow: hidden; }
  .prog-fill { width: 0%; height: 100%; background: linear-gradient(90deg,#705697,#9D6089); border-radius: 99px; transition: width .4s; }

  .sentence {
    background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.08);
    border-radius: 14px; padding: 5% 6%;
    color: #fff; font-size: 4.4cqw; line-height: 1.5; text-align: center;
    margin: 0 0 6%;
  }
  .blank { border-bottom: 2px solid rgba(255,255,255,0.5); padding: 0 1.5%; display: inline-block; min-width: 17%; white-space: nowrap; }

  .pill-row { display: grid; grid-template-columns: repeat(4, 1fr); row-gap: 7%; column-gap: 1.5%; margin-bottom: 6%; }
  .pill {
    background: rgba(255,255,255,0.05); border: 1.5px solid rgba(255,255,255,0.08);
    border-radius: 12px;
    font-size: 3.5cqw; color: rgba(255,255,255,0.85);
    cursor: pointer; font-family: inherit; transition: transform .12s, background .15s, border-color .15s, color .15s;
    padding: 2.5% 2%; min-width: 0;
  }

  .check-btn {
    display: block; margin: 0 auto 6%;
    padding: 3% 12%; border-radius: 999px;
    background: rgba(112,82,180,0.16); border: 1.5px solid rgba(112,82,180,0.5);
    color: #C9B8EA; font-size: 4.4cqw; font-weight: 500; cursor: pointer; font-family: inherit;
  }
  .check-btn:disabled { opacity: 0.5; pointer-events: none; }

  .status { font-size: 3.2cqw; color: rgba(255,255,255,0.5); text-align: center; }

  .legend { display: flex; justify-content: center; gap: 3%; flex-wrap: nowrap; height: 100%; align-items: center; }
  .legend span { font-size: 2.7cqw; color: rgba(255,255,255,0.55); display: flex; align-items: center; gap: 3px; white-space: nowrap; }
  .dot { width: 1.8cqw; height: 1.8cqw; border-radius: 50%; display: inline-block; flex-shrink: 0; }

  .frame-mask {
    position: absolute; inset: 0; z-index: 4;
    background-image: url('assets/frame_mask.png');
    background-size: 100% 100%;
    pointer-events: none;
  }
  .overlay {
    display: none; position: absolute; inset: 0; z-index: 3;
    background: rgba(10,8,20,0.9);
    text-align: center; align-items: center; justify-content: center;
    flex-direction: column; padding: 5%;
  }
  .continue-btn, .next-btn {
    padding: 3% 12%; border-radius: 999px; border: none;
    background: linear-gradient(180deg,#3D30B7 0%,#7052B4 45%,#A45B8B 100%);
    color: #fff; font-size: 4cqw; font-weight: 500; cursor: pointer; font-family: inherit;
  }
  .stars-row { display: flex; justify-content: center; align-items: center; gap: 3%; margin-bottom: 4%; min-height: 12cqw; }
</style>
</head>
<body>
<div class="frame-wrap">
<div class="app-frame">
  <div class="layer-bg"></div>
  <div class="frame-mask"></div>
  <div class="layer-scene"></div>

  <div class="pos block-header">
    <div class="header-inner">
      <div class="header-left">
        <div class="badge">4</div>
        <span class="module-title">Fill the gap</span>
      </div>
      <div class="medal-icon"><img src="assets/silver.png?v=2" alt="Silver tier"></div>
    </div>
  </div>

  <div class="pos block-qlabel q-label" id="qLabel">Question 1 of 3</div>

  <div class="pos block-progress">
    <div class="prog-track"><div class="prog-fill" id="progFill"></div></div>
  </div>

  <div class="pos block-flowzone">
    <p class="sentence" id="sentence">&nbsp;</p>
    <div class="pill-row" id="pillRow"></div>
    <button id="checkBtn" class="check-btn">Check</button>
    <p class="status" id="status">&nbsp;</p>
  </div>

  <div id="overlay" class="overlay">
    <div id="reinforceContent" style="display:none;">
      <div style="font-size:3.5cqw;font-weight:600;color:#AED581;margin-bottom:4%;">correct!</div>
      <div style="font-size:4cqw;line-height:2;margin-bottom:5%;" id="reinforceSentence"></div>
      <div id="reinforceLegend"></div>
      <button id="continueBtn" class="continue-btn" style="margin-top:4%;">Continue</button>
    </div>
    <div id="completeContent" style="display:none;">
      <div class="stars-row" id="starsRow"></div>
      <div style="font-size:5cqw;color:#fff;font-weight:500;margin-bottom:2%;">Module complete</div>
      <div style="font-size:3.3cqw;color:rgba(255,255,255,0.5);margin-bottom:7%;" id="scoreLabel"></div>
      <button id="nextModuleBtn" class="next-btn">Next module</button>
    </div>
  </div>
</div>
</div>
<script>
(function(){
  // Real data, copied verbatim from LESSON['mod-4'] in index.html
  var GRAMMAR_COLORS = {
    subject: { bg: 'rgba(0,188,212,0.18)',  border: '#00BCD4', color: '#00BCD4' },
    verb:    { bg: 'rgba(139,195,74,0.18)', border: '#8BC34A', color: '#8BC34A' },
    object:  { bg: 'rgba(255,152,0,0.18)',  border: '#FF9800', color: '#FFB74D' },
    place:   { bg: 'rgba(171,71,188,0.18)', border: '#AB47BC', color: '#CE93D8' },
    time:    { bg: 'rgba(233,30,99,0.18)',  border: '#E91E63', color: '#F48FB1' }
  };
  function grammarSentence(tokens){
    return tokens.map(function(t){
      var c = GRAMMAR_COLORS[t.role];
      if(!c) return '<span style="color:#fff;">'+t.text+'</span>';
      return '<span style="display:inline-block;background:'+c.bg+';border:1.5px solid '+c.border+';color:'+c.color+';border-radius:999px;padding:2px 9px;margin:1px 2px;font-weight:600;font-size:.95em;">'+t.text+'</span>';
    }).join(' ');
  }
  function grammarLegend(tokens){
    var FADED = {
      subject: { dot: '#1A6070', text: '#3A7A8A' },
      verb:    { dot: '#3A5C22', text: '#4A7030' },
      object:  { dot: '#6A4008', text: '#7A5010' },
      place:   { dot: '#4A2058', text: '#5A3068' },
      time:    { dot: '#6A1030', text: '#7A2040' }
    };
    var ORDER = ['subject', 'verb', 'object', 'place', 'time'];
    var present = {};
    (tokens || []).forEach(function(t){ present[t.role] = true; });
    var roles = ORDER.filter(function(r){ return present[r] && FADED[r]; });
    if(roles.length === 0) return '';
    var pills = roles.map(function(role){
      var c = FADED[role];
      return '<span style="display:inline-flex;align-items:center;gap:4px;color:'+c.text+';font-size:11px;font-weight:600;white-space:nowrap;"><span style="width:7px;height:7px;border-radius:50%;background:'+c.dot+';flex-shrink:0;"></span>'+role.charAt(0).toUpperCase()+role.slice(1)+'</span>';
    }).join('');
    return '<div style="display:flex;align-items:center;justify-content:center;gap:10px;flex-wrap:wrap;">'+pills+'</div>';
  }

  var questions = [
    {
      sentence: 'I ___ water every day.',
      answer: 'drink',
      options: ['drink', 'eat', 'sleep', 'run'],
      tokens: [
        {text:'I', role:'subject'}, {text:'drink', role:'verb'},
        {text:'water', role:'object'}, {text:'every day', role:'time'}
      ]
    },
    {
      sentence: 'She ___ her homework before dinner.',
      answer: 'does',
      options: ['does', 'eats', 'reads', 'plays', 'sleeps'],
      tokens: [
        {text:'She', role:'subject'}, {text:'does', role:'verb'},
        {text:'her homework', role:'object'}, {text:'before dinner', role:'time'}
      ]
    },
    {
      sentence: 'My uncle works at the hospital and ___ sick people.',
      answer: 'helps',
      options: ['helps', 'calls', 'reads', 'drives', 'meets', 'teaches'],
      tokens: [
        {text:'My uncle', role:'subject'}, {text:'works', role:'verb'},
        {text:'at the hospital', role:'place'}, {text:'and', role:'connector'},
        {text:'helps', role:'verb'}, {text:'sick people', role:'object'}
      ]
    }
  ];
  var qi=0, correctFirstTry=0, attemptedWrongOnCurrent=false, locked=false;
  var ctx=null, muted=false;
  function unlock(){ if(!ctx){ ctx=new (window.AudioContext||window.webkitAudioContext)(); } }
  function tone(freq,dur){
    if(muted) return; unlock();
    var o=ctx.createOscillator(), g=ctx.createGain();
    o.frequency.value=freq; g.gain.setValueAtTime(0.15,ctx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+dur);
    o.connect(g); g.connect(ctx.destination); o.start(); o.stop(ctx.currentTime+dur);
  }
  function sfx(name){
    if(name==='tap') tone(600,0.06);
    if(name==='correct'){ tone(880,0.12); setTimeout(function(){tone(1180,0.14);},90); }
    if(name==='wrong') tone(350,0.22);
    if(name==='star') tone(1000,0.1);
    if(name==='complete'){ tone(700,0.1); setTimeout(function(){tone(1050,0.16);},110); }
  }
  var SPEAK_MOODS = { neutral: { rate:0.85, pitch:1.0, volume:0.9 } };
  function speak(text, mood, delay){
    if(!window.speechSynthesis) return;
    setTimeout(function(){
      window.speechSynthesis.cancel();
      var u = new SpeechSynthesisUtterance(text);
      var m = SPEAK_MOODS[mood || 'neutral'];
      u.rate = m.rate; u.pitch = m.pitch; u.volume = m.volume;
      window.speechSynthesis.speak(u);
    }, delay || 0);
  }
  var pillRow = document.getElementById('pillRow');
  var checkBtn = document.getElementById('checkBtn');
  var selected = null;
  function setCheckEnabled(on){
    locked = !on;
    checkBtn.disabled = !on;
  }
  function renderQuestion(){
    var q = questions[qi];
    document.getElementById('qLabel').textContent = 'Question '+(qi+1)+' of '+questions.length;
    document.getElementById('progFill').style.width = Math.round((qi/questions.length)*100)+'%';
    document.getElementById('sentence').innerHTML = q.sentence.replace('___', '<span class="blank" id="blankSlot">&nbsp;</span>');
    document.getElementById('status').textContent = '\u00A0';
    selected = null;
    attemptedWrongOnCurrent = false;
    setCheckEnabled(true);
    pillRow.innerHTML = '';
    var PALETTE = [
      { border:'#00BCD4', bg:'rgba(0,188,212,.18)',  color:'#4DD0E1' },
      { border:'#AB47BC', bg:'rgba(171,71,188,.18)', color:'#CE93D8' },
      { border:'#FF9800', bg:'rgba(255,152,0,.18)',  color:'#FFB74D' },
      { border:'#E91E63', bg:'rgba(233,30,99,.18)',  color:'#F48FB1' },
      { border:'#8BC34A', bg:'rgba(139,195,74,.18)', color:'#AED581' }
    ];
    q.options.forEach(function(opt, idx){
      var b = document.createElement('button');
      b.textContent = opt;
      b.className = 'pill';
      b.dataset.word = opt;
      var c = PALETTE[idx % PALETTE.length];
      b.addEventListener('click', function(){
        if(locked) return;
        unlock();
        Array.from(pillRow.children).forEach(function(x){
          x.classList.remove('selected');
          x.style.borderColor = ''; x.style.background = ''; x.style.color = '';
        });
        b.classList.add('selected');
        b.style.borderColor = c.border; b.style.background = c.bg; b.style.color = c.color;
        b.style.transform = 'scale(0.95)';
        setTimeout(function(){ b.style.transform='scale(1)'; },120);
        selected = opt;
        var blank = document.getElementById('blankSlot');
        if(blank){ blank.textContent = opt; blank.style.color = c.color; }
        sfx('tap');
      });
      pillRow.appendChild(b);
    });
  }
  var overlay = document.getElementById('overlay');
  function showReinforce(){
    var q = questions[qi];
    document.getElementById('reinforceSentence').innerHTML = grammarSentence(q.tokens);
    document.getElementById('reinforceLegend').innerHTML = grammarLegend(q.tokens);
    document.getElementById('completeContent').style.display = 'none';
    document.getElementById('reinforceContent').style.display = 'block';
    overlay.style.display = 'flex';
    var plainSentence = q.tokens.map(function(t){ return t.text; }).join(' ');
    speak(plainSentence, 'neutral', 200); // matches real showReinforcePanel(sentenceOnly:true)
  }
  checkBtn.addEventListener('click', function(){
    if(locked) return;
    unlock();
    if(!selected){
      document.getElementById('status').textContent = 'pick an option first';
      return;
    }
    var q = questions[qi];
    if(selected === q.answer){
      setCheckEnabled(false);
      sfx('correct');
      if(!attemptedWrongOnCurrent){ correctFirstTry++; }
      document.getElementById('status').textContent = attemptedWrongOnCurrent ? 'correct, nice recovery' : 'correct, first try';
      setTimeout(showReinforce, 550);
    } else {
      attemptedWrongOnCurrent = true;
      sfx('wrong');
      var sel = pillRow.querySelector('[data-word="'+selected+'"]');
      sel.animate([{transform:'translateX(0)'},{transform:'translateX(-6px)'},{transform:'translateX(6px)'},{transform:'translateX(-4px)'},{transform:'translateX(0)'}],{duration:350});
      document.getElementById('status').textContent = 'not quite, try again';
    }
  });
  document.getElementById('continueBtn').addEventListener('click', function(){
    overlay.style.display = 'none';
    qi++;
    if(qi < questions.length){
      renderQuestion();
    } else {
      document.getElementById('progFill').style.width = '100%';
      var pct = correctFirstTry/questions.length;
      var starCount = pct === 1 ? 3 : pct >= 0.6 ? 2 : 1;
      document.getElementById('scoreLabel').textContent = correctFirstTry+' of '+questions.length+' correct on first try';
      document.getElementById('reinforceContent').style.display = 'none';
      document.getElementById('completeContent').style.display = 'block';
      var starsEl = document.getElementById('starsRow');
      starsEl.innerHTML = '';
      for(var s=0; s<starCount; s++){
        var slotImg = document.createElement('img');
        slotImg.src = 'assets/star.png';
        slotImg.alt = '';
        slotImg.style.width = '10cqw';
        slotImg.style.height = '10cqw';
        slotImg.style.opacity = '0';
        slotImg.style.transform = 'scale(0)';
        starsEl.appendChild(slotImg);
      }
      var allStarImgs = starsEl.querySelectorAll('img');
      overlay.style.display = 'flex';
      var i=0;
      function dropStar(){
        if(i>=starCount){
          sfx('complete');
          allStarImgs.forEach(function(img, si){
            setTimeout(function(){
              img.animate([
                { filter:'brightness(1) drop-shadow(0 0 0px rgba(240,174,99,0))' },
                { filter:'brightness(1.6) drop-shadow(0 0 10px rgba(240,174,99,0.9))' },
                { filter:'brightness(1) drop-shadow(0 0 0px rgba(240,174,99,0))' }
              ], { duration: 500, easing:'ease-in-out' });
            }, si*120);
          });
          return;
        }
        var img = allStarImgs[i];
        img.animate([{transform:'scale(0)',opacity:0},{transform:'scale(1)',opacity:1}],{duration:320,easing:'ease-out',fill:'forwards'});
        sfx('star');
        i++;
        setTimeout(dropStar, 220);
      }
      dropStar();
    }
  });
  document.getElementById('nextModuleBtn').addEventListener('click', function(){
    overlay.style.display='none';
    qi=0; correctFirstTry=0;
    renderQuestion();
  });
  var _tierParam = new URLSearchParams(location.search).get('tier');
  var _tierMap = { bronze:0, silver:1, gold:2 };
  if(_tierParam && _tierMap[_tierParam] !== undefined) { qi = _tierMap[_tierParam]; }
  renderQuestion();
})();
</script>
</body>
</html>
